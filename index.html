<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <h1>Odin Calculator</h1>
    <div class="calculator">
      <div class="calc-display-container">
        <div id="display-content"></div>
      </div>
      <div class="calc-buttons-container">
          <button class="utility" id="clear">AC</button>
          <button class="utility" id="delete">DEL</button>
          <button class="utility">%</button>
          <button class="operator">/</button>

          <button class="number">7</button>
          <button class="number">8</button>
          <button class="number">9</button>
          <button class="operator">*</button>

          <button class="number">4</button>
          <button class="number">5</button>
          <button class="number">6</button>
          <button class="operator">-</button>

          <button class="number">1</button>
          <button class="number">2</button>
          <button class="number">3</button>
          <button class="operator">+</button>

          <button class="number" id="zero">0</button>
          <button class="utility">.</button>
          <button class="operator" id="equals-button">=</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
